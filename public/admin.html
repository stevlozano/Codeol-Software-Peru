<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="background-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CODEOL Admin">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Panel de administración CODEOL - Gestión de pedidos y ventas">
  
  <!-- Admin PWA Manifest - SEPARATE from main app -->
  <link rel="manifest" href="/admin-manifest.json">
  
  <!-- Icons -->
  <link rel="icon" type="image/png" href="/images/logooriginal.png">
  <link rel="apple-touch-icon" href="/images/logooriginal.png">
  
  <title>CODEOL Admin</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    
    p {
      color: #888;
      margin-bottom: 32px;
      font-size: 16px;
    }
    
    .loading {
      width: 40px;
      height: 40px;
      border: 3px solid #1a1a1a;
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .btn {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }
    
    .btn:hover {
      background: rgba(16, 185, 129, 0.3);
    }
    
    .install-hint {
      margin-top: 24px;
      padding: 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      max-width: 320px;
      text-align: center;
      font-size: 14px;
      color: #666;
      display: none;
    }
    
    .install-hint.show {
      display: block;
    }
  </style>
</head>
<body>
  <img src="/images/logooriginal.png" alt="CODEOL Logo" class="logo">
  <h1>CODEOL Admin</h1>
  <p>Panel de Administración</p>
  
  <div class="loading" id="loading"></div>
  
  <a href="/admin" class="btn" id="enterBtn" style="display: none;">
    Entrar al Dashboard
  </a>
  
  <div class="install-hint" id="installHint">
    💡 Para instalar esta app:<br>
    <strong>Android:</strong> Menú → Agregar a pantalla de inicio<br>
    <strong>iPhone:</strong> Compartir → Agregar a inicio
  </div>

  <script>
    // Register Service Worker for Admin PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then((reg) => {
          console.log('Admin SW registered:', reg);
        })
        .catch((err) => {
          console.error('SW registration failed:', err);
        });
    }
    
    // Check if running as installed PWA
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
                      || window.navigator.standalone === true;
    
    if (isStandalone) {
      // Already installed, redirect to admin immediately
      window.location.href = '/admin';
    } else {
      // Show install hint after 2 seconds
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('enterBtn').style.display = 'inline-flex';
        document.getElementById('installHint').classList.add('show');
      }, 2000);
    }
    
    // Request notification permission
    if ('Notification' in navigator && Notification.permission === 'default') {
      setTimeout(() => {
        Notification.requestPermission();
      }, 3000);
    }
  </script>
</body>
</html>
